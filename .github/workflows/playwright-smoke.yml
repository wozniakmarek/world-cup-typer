name: Playwright Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Resolve E2E base URL
        env:
          SECRET_PRODUCTION_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          SECRET_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
        run: |
          echo "E2E_SMOKE_MODE=production" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "E2E_BASE_URL=http://127.0.0.1:4173" >> "$GITHUB_ENV"
            echo "USE_LOCAL_PREVIEW=true" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ -n "$SECRET_PRODUCTION_BASE_URL" ]; then
            echo "E2E_BASE_URL=$SECRET_PRODUCTION_BASE_URL" >> "$GITHUB_ENV"
            echo "USE_LOCAL_PREVIEW=false" >> "$GITHUB_ENV"
          elif [ -n "$SECRET_STAGING_BASE_URL" ]; then
            echo "E2E_BASE_URL=$SECRET_STAGING_BASE_URL" >> "$GITHUB_ENV"
            echo "E2E_SMOKE_MODE=staging" >> "$GITHUB_ENV"
            echo "USE_LOCAL_PREVIEW=false" >> "$GITHUB_ENV"
          elif [ -n "$SECRET_PRODUCTION_BASE_URL" ]; then
            echo "E2E_BASE_URL=$SECRET_PRODUCTION_BASE_URL" >> "$GITHUB_ENV"
            echo "USE_LOCAL_PREVIEW=false" >> "$GITHUB_ENV"
          else
            echo "E2E_BASE_URL=http://127.0.0.1:4173" >> "$GITHUB_ENV"
            echo "USE_LOCAL_PREVIEW=true" >> "$GITHUB_ENV"
          fi

      - name: Start local preview fallback
        if: ${{ env.USE_LOCAL_PREVIEW == 'true' }}
        run: |
          npm run build
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/frontend-preview.log 2>&1 &

      - name: Wait for local preview
        if: ${{ env.USE_LOCAL_PREVIEW == 'true' }}
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Local preview did not start in time."
          exit 1

      - name: Run Playwright smoke tests
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
          E2E_SMOKE_MODE: ${{ env.E2E_SMOKE_MODE }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
        run: npm run test:e2e:smoke

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
