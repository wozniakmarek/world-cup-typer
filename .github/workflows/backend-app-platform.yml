name: Deploy backend to DigitalOcean App Platform

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/world-cup-typer-api

jobs:
  deploy:
    name: Build, publish and deploy backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push backend image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/WorldCupTyper.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy app spec to DigitalOcean
        uses: digitalocean/app_action/deploy@v2
        env:
          API_IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          GHCR_CREDENTIALS: ${{ secrets.GHCR_CREDENTIALS }}
          DEFAULT_CONNECTION: ${{ secrets.DEFAULT_CONNECTION }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
          print_build_logs: true
          print_deploy_logs: true
